# Benchmark configuration
# Controls which models to run, segmentation, and extraction settings.
#
# Every model listed here gets identical input and identical prompts.
# The harness then compares their outputs head-to-head.

name: "default"

# Models to include in the benchmark (must match keys in models.yaml)
# Empty list = run all models in models.yaml
models:
  - gemini-3.1-pro
  - gpt-5.4
  - qwen3.5-vl
  - llama-4-maverick

# Prompt template to use (concise, rich, strict_json)
prompt_version: "action_label"

# Segmentation settings
segmentation:
  mode: fixed_window
  window_size_s: 10.0
  stride_s: null        # null = no overlap
  min_segment_s: 2.0

# Frame extraction settings
extraction:
  num_frames: 8
  method: uniform
  image_format: jpg
  image_quality: 85
  max_dimension: 1280
  generate_contact_sheet: false
  contact_sheet_cols: 4
