# Model configuration for video eval harness
#
# All models receive identical inputs (same frames, same prompt) and are
# compared head-to-head on parse success, latency, cost, and agreement.

models:
  gemini-3.1-pro:
    model_id: "google/gemini-3.1-pro-preview"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    tier: frontier
    notes: "Frontier reasoning model with multimodal support, 1M-token context"

  gpt-5.4:
    model_id: "openai/gpt-5.4"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    tier: frontier
    notes: "OpenAI latest frontier model with 1M+ context, text and image inputs"

  qwen3.5-vl:
    model_id: "qwen/qwen3.5-397b-a17b"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    tier: frontier
    notes: "Native vision-language model, hybrid MoE architecture activating 17B params"

  claude-sonnet-4.6:
    model_id: "anthropic/claude-sonnet-4.6"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    tier: frontier
    notes: "Strong multimodal reasoning from Anthropic"

  gemini-3-flash:
    model_id: "google/gemini-3-flash-preview"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    tier: fast
    notes: "Fast Gemini variant, lower-cost than Pro"

  gpt-5.4-mini:
    model_id: "openai/gpt-5.4-mini"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    tier: fast
    notes: "Lower-cost GPT-5.4 variant for smoke tests"

  qwen3.5-27b:
    model_id: "qwen/qwen3.5-27b"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
