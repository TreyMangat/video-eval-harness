# Model configuration for video eval harness
#
# All models receive identical inputs (same frames, same prompt) and are
# compared head-to-head on parse success, latency, cost, and agreement.
# This is an apples-to-apples benchmark, not a pipeline.
#
# Model IDs are OpenRouter identifiers. See https://openrouter.ai/models
# Supported providers: openrouter, openai, gemini

models:
  # ── Tier 1: Frontier vision models (default benchmark set) ──

  gemini-3.1-pro:
    model_id: "google/gemini-3.1-pro-preview"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Frontier reasoning model with multimodal support, 1M-token context"

  gpt-5.4:
    model_id: "openai/gpt-5.4"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "OpenAI latest frontier model with 1M+ context, text and image inputs"

  qwen3.5-vl:
    model_id: "qwen/qwen3.5-397b-a17b"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Native vision-language model, hybrid MoE architecture activating 17B params"

  claude-sonnet-4.6:
    model_id: "anthropic/claude-sonnet-4.6"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Strong multimodal reasoning from Anthropic"

  # ── Optional: Cheaper/faster models for iteration ──
  # Uncomment these when you want to test pipeline throughput or reduce cost
  # during development. They're not part of the default benchmark set.

