# Model configuration for video eval harness
# Model IDs are OpenRouter model identifiers
# See https://openrouter.ai/models for available models

models:
  gpt4o:
    model_id: "openai/gpt-4o"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "GPT-4o - strong multimodal model"

  gpt4o-mini:
    model_id: "openai/gpt-4o-mini"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "GPT-4o-mini - faster and cheaper"

  gemini-2-flash:
    model_id: "google/gemini-2.0-flash-001"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Gemini 2.0 Flash - fast multimodal"

  gemini-2-pro:
    model_id: "google/gemini-2.5-pro-preview"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Gemini 2.5 Pro - strong reasoning"

  claude-sonnet:
    model_id: "anthropic/claude-sonnet-4"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Claude Sonnet 4 - strong vision"

  qwen-vl:
    model_id: "qwen/qwen2.5-vl-72b-instruct"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Qwen2.5-VL-72B - strong open multimodal model"

