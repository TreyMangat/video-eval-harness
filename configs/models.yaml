# Model configuration for video eval harness
# Model IDs are OpenRouter model identifiers by default.
# See https://openrouter.ai/models for available models.
#
# Supported providers: openrouter, openai, gemini
# OpenRouter is recommended (one key, many models).

models:
  # === OpenRouter models (recommended - one key for all) ===
  gpt4o:
    model_id: "openai/gpt-4o"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "GPT-4o - strong multimodal model"

  gpt4o-mini:
    model_id: "openai/gpt-4o-mini"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "GPT-4o-mini - faster and cheaper"

  gemini-2-flash:
    model_id: "google/gemini-2.0-flash-001"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Gemini 2.0 Flash - fast multimodal"

  gemini-2-pro:
    model_id: "google/gemini-2.5-pro-preview"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Gemini 2.5 Pro - strong reasoning"

  claude-sonnet:
    model_id: "anthropic/claude-sonnet-4"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Claude Sonnet 4 - strong vision"

  qwen-vl:
    model_id: "qwen/qwen2.5-vl-72b-instruct"
    provider: openrouter
    max_tokens: 2048
    temperature: 0.1
    supports_images: true
    supports_video: false
    notes: "Qwen2.5-VL-72B - strong open multimodal model"

  # === Native OpenAI models (requires OPENAI_API_KEY) ===
  # Uncomment to use direct OpenAI API instead of OpenRouter:
  # gpt4o-native:
  #   model_id: "gpt-4o"
  #   provider: openai
  #   max_tokens: 2048
  #   temperature: 0.1
  #   supports_images: true
  #   notes: "GPT-4o via native OpenAI API"

  # === Native Gemini models (requires GOOGLE_API_KEY) ===
  # Uncomment to use direct Gemini API instead of OpenRouter:
  # gemini-native:
  #   model_id: "gemini-2.0-flash"
  #   provider: gemini
  #   max_tokens: 2048
  #   temperature: 0.1
  #   supports_images: true
  #   notes: "Gemini 2.0 Flash via native Google API"

